name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (commit SHA or 'latest')"
        required: true
        default: "latest"
      confirm:
        description: "Type 'yes' to confirm production deployment"
        required: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    environment: production

    steps:
      - name: Validate image exists
        run: |
          echo "Deploying image tag: ${{ github.event.inputs.image_tag }}"

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Write the environment file
            cat << 'ENVEOF' > /opt/todo-api/.env
            ${{ secrets.PROD_ENV_FILE }}
            ENVEOF

            # Pull the specified image tag
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/golang-todo-api:${{ github.event.inputs.image_tag }}

            # Stop and remove the old container (if running)
            docker stop todo-api-prod 2>/dev/null || true
            docker rm todo-api-prod 2>/dev/null || true

            # Run the new container
            docker run -d \
              --name todo-api-prod \
              --restart unless-stopped \
              --env-file /opt/todo-api/.env \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/golang-todo-api:${{ github.event.inputs.image_tag }}

            # Clean up old images
            docker image prune -f

            echo "Production deployment complete"

      - name: Deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ github.event.inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
